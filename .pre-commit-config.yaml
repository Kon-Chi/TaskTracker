repos:
  # Lint with flake8
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--jobs=1]
        files: ^(src|tests)/

  # Security scan with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-r, src]
        files: ^src/

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        args: [src]
        additional_dependencies: []
        files: ^src/

  # Run tests (note: pre-commit typically doesn't run tests, but here's how)
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: poetry run pytest --cov=src --cov-report=term-missing --cov-fail-under=75
        language: system
        pass_filenames: false
        always_run: true
        files: ^(src|tests)/

      - id: pip-audit
        name: pip-audit
        entry: poetry run pip-audit --cache-dir .cache/pip-audit --progress-spinner=off --strict
        language: system
        pass_filenames: false
        always_run: true
