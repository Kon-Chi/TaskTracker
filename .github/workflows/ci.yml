name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root --extras dev

      - name: Lint (flake8)
        run: poetry run flake8 --jobs=1 src tests

      - name: Tests + coverage
        run: poetry run pytest --cov=src --cov-report=term-missing --cov-fail-under=75

      - name: Security scan (bandit)
        run: poetry run bandit -r src

      - name: Dependency audit
        run: mkdir -p .cache/pip-audit && poetry run pip-audit --cache-dir .cache/pip-audit --progress-spinner=off --strict

      - name: Complexity (radon)
        run: poetry run flake8 --radon-max-cc=7 src

      - name: Maintainability Index (radon)
        run: poetry run radon mi -s src

      - name: Typecheck (mypy)
        run: poetry run mypy src

